<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DomainGen Pro | AI-Powered Domain Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">D</div>
            <h1>Domain<span>Gen</span></h1>
        </div>
        <p class="sidebar-desc">Paste news articles or social media posts to find available brand names.</p>
        
        <div class="settings">
            <label>Domain Extension</label>
            <select id="tld-select">
                <option value=".com">.com</option>
                <option value=".net">.net</option>
                <option value=".org">.org</option>
                <option value=".io">.io</option>
                <option value=".ai">.ai</option>
            </select>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-header">
            <h2>Analyze Text for Domains</h2>
            <button class="btn btn-primary" onclick="processText()">Generate & Check</button>
        </header>

        <section class="input-section">
            <textarea id="input-text" placeholder="Paste your social media post or news article here... e.g., 'SpaceX is launching a new rocket to Mars for satellite internet'"></textarea>
        </section>

        <section class="results-section">
            <div class="results-header">
                <h3>Available Domains</h3>
                <span id="status-msg">Ready</span>
            </div>
            <div id="results-grid" class="results-grid">
                <div class="empty-state">No domains generated yet.</div>
            </div>
        </section>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
